<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furina AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="chat-area">
            <div id="chat-window">
                <div class="message ai">Olá! Eu sou a Furina AI. O que vamos criar hoje?</div>
            </div>
            
            <div id="loading" class="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>

            <div class="input-container">
                <input type="text" id="user-input" placeholder="Escreva sua mensagem...">
                <button id="send-btn">Enviar</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
